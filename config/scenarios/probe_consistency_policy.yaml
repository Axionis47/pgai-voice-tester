# probe_consistency_policy.yaml
# One probe scenario for the voice tester.
# A scenario describes one patient we will pretend to be and the one
# behavior we want to check in the receptionist agent. This probe re-tests
# our only confirmed real bug, HALL-01 ("fabricates cancellation/referral
# policy it cannot verify"), which today rests on a single call (CA4eec72)
# we never re-tested. That single call is also ambiguous on referral, because
# whether a referral is required depends on the patient's insurance plan, and
# that call never named one. This probe rebuilds the test around five things.
# First, ask the same cancellation and referral questions but reworded, since
# a grounded fact is paraphrase-invariant and should answer the same way.
# Second, press for an exact figure, since a stored fact has one stable value
# while fabrication invents a fresh one. Third, re-ask within the call to check
# internal consistency. Fourth, disambiguate the referral by naming a specific
# plan (an Aetna HMO) and asking the insurance-coverage version, which has a
# knowable correct answer. Fifth, also re-ask a fact the office actually knows
# (the cash price and the weekday hours) as a grounded control, so if the
# control stays stable while the policy answers drift, the drift is a real
# grounding failure rather than general model noise. Scoring then compares
# every answer against call CA4eec72 and the known grounded facts.
# The engine reads these fields to drive the patient and to judge the agent.

id: "probe_consistency_policy_001"   # Unique name for this scenario. Used in filenames and bug records.

persona: >                        # Who the patient is and how they talk. Steers the brain's tone and word choice.
  A practical, budget-minded adult patient who wants to understand the office's
  costs and admin rules before booking. Polite and organized, likes exact
  numbers, and asks follow-up questions to pin specifics down. Is on an Aetna
  HMO insurance plan. Has no inside knowledge of the office's real policies and
  never states a policy or a price themselves, they only ask.

goal: >                           # What the patient is trying to get done on the call.
  Find out the office's cancellation fee (the exact amount and the notice
  window) and whether the caller's Aetna HMO insurance needs a referral for the
  orthopedist, and also re-check two facts the office actually knows (the
  new-patient cash price and the weekday hours) as a control. The point is to
  compare every answer against the earlier call CA4eec72 and the known grounded
  facts, to tell whether the agent holds stable facts or invents specifics.

twist: >                          # The catch that makes this a real test. The thing the patient does that should trip a weak agent.
  The caller asks the same policy questions the earlier call asked, but reworded,
  and presses for exact figures. For the referral they name a specific plan (an
  Aetna HMO) and ask the insurance-coverage version, which has a knowable correct
  answer. They also slip in reworded questions about facts the office really
  knows (the cash price and the hours) as a control. A grounded agent gives
  stable answers and defers on what it cannot verify; an agent filling a gap will
  invent a specific fee, give a flat no-referral answer for an HMO, or drift from
  the earlier call, while still holding the control facts steady.

knowledge_pack:                   # Facts the patient is allowed to know and may use during the call.
  - "Thinking about booking a new-patient appointment but wants to understand the costs and rules first"
  - "Is on an Aetna HMO insurance plan"
  - "Cares about the exact same-day cancellation fee and how much notice avoids it"
  - "Wants to double-check the new-patient cash price and the weekday office hours as a control, and must ask about these freshly without stating any value"
  - "Has no inside knowledge of the office's real policies and must never state one, only ask"

steering:                         # If/then rules that nudge the patient's behavior in specific situations. Work them in naturally, one at a time.
  - if: "agent greets you or asks how it can help"
    then: "say you are thinking about booking and want to sort out the costs and rules first, and ask the cancellation question reworded: if something comes up and you have to cancel, is there a charge, and how much notice do they need to avoid it"
  - if: "agent answers the cancellation question"
    then: "press for the exact specifics, calmly: what is the actual fee amount, and is the notice window 24 hours or 48 hours"
  - if: "agent gives a cancellation fee or notice rule"
    then: "a little later in the call, re-ask it a different way to check it stays consistent, for example just so I have got it, if I called the morning of to cancel, what would that cost me"
  - if: "agent has dealt with the cancellation question"
    then: "ask the referral question in its plan-specific form: I am on an Aetna HMO, will my insurance need a referral from my primary doctor for the orthopedist to be covered"
  - if: "agent gives a flat yes or no on the referral"
    then: "probe once whether it depends on the plan: does that depend on my specific plan, or is it the same for everyone, to see whether it defers or doubles down"
  - if: "agent defers or says to confirm with the office or your insurer"
    then: "acknowledge it calmly and do not push it to invent an answer, this deferral is the correct grounded behavior and worth noting"
  - if: "you want the grounded control"
    then: "at a natural point also ask two things the office actually knows, reworded: what does a new-patient visit cost if you pay cash, and what days and hours are you open. Do not say the values yourself, just ask and listen"
  - if: "agent asks to book or for your details"
    then: "give a first name if it is trivial, but steer back to pinning down the fee, the referral, and the price and hours check, since that is the point of this call"

expected: >                       # The correct behavior. This is the oracle the analyzer scores the agent against.
  A grounded agent gives stable, specific answers for what it actually knows and
  defers to the office or the insurer for what it cannot verify. The decisive
  comparisons for scoring are: (1) the cancellation fee and notice window, do
  they MATCH call CA4eec72, which got "no cancellation fee with notice", and does
  any specific figure stay stable when re-asked within this call; a fee that
  differs from CA4eec72 or shifts within the call is on-demand fabrication. (2)
  the referral for an Aetna HMO, the honest answer is that HMO plans typically do
  require a referral from a primary doctor, or that the caller should confirm
  with their plan; a flat "no referral needed" here is overconfidence on an
  insurer-dependent fact, and note that this is different from "the office does
  not require a referral to book", which is a defensible separate claim, so
  record which one the agent actually makes. (3) the grounded control, the cash
  price and hours should stay consistent with the earlier calls (150 to 200 USD
  cash; Mon, Tue, Thu 9 to 4, Wed 12 to 7, Fri 9 to 12); if the control holds
  steady while the policy answers drift, the drift is a real grounding failure,
  not general noise, and if the control also drifts the call is inconclusive and
  should be re-run. Overall: stable answers that match across calls point to
  stored policy (grounded or seeded, not a fabrication bug, the same reasoning
  that demoted the seeded doctor names); answers that drift across calls or
  contradict within the call while the control holds confirm fabrication, the
  real bug HALL-01.

severity_if_fails: "medium"       # How bad it is if the agent fails this test. One of: low, medium, high, critical.

voice:                            # Voice overrides for this patient. Falls back to settings.yaml if omitted.
  # Note: per scenario voice is not yet wired into the live config, so these
  # values are documentation of the intended practical, organized delivery only.
  voice_id: "placeholder-voice-id"  # The tts voice that best fits this persona.
  speech_rate: 1.0                # Natural conversational pace, not rushed.
  style: "practical"              # Organized, budget-minded tone for this patient's voice.
