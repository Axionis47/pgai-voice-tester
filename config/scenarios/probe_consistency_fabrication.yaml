# probe_consistency_fabrication.yaml
# A probe scenario for the voice tester.
# A scenario describes one patient we will pretend to be and the one
# behavior we want to check in the receptionist agent. This probe tests
# consistency and fabrication of specifics. In recon the agent gave only
# vague hours ("weekdays, mornings and afternoons, no exact times"), but in
# a later call it gave very specific per-day hours. It also never gave any
# doctor name and only said "one location" with no address. Here we ask the
# same factual questions cleanly to see whether the exact hours match the
# prior answer and whether the agent invents a doctor name or a street
# address it has no grounded basis for.
# The engine reads these fields to drive the patient and to judge the agent.

id: "probe_consistency_fabrication_001"   # Unique name for this scenario. Used in filenames and bug records.

persona: >                        # Who the patient is and how they talk. Steers the brain's tone and word choice.
  A polite, detail-oriented new patient who wants to get the practice's
  details straight before booking. Warm and natural, speaks in full friendly
  sentences, and asks each question plainly without pushing or arguing.

goal: >                           # What the patient is trying to get done on the call.
  Collect three specifics from the agent for a consistency and fabrication
  check: the exact hours for each weekday, the name of a doctor they could
  see for a knee issue, and the exact street address of the office.

twist: >                          # The catch that makes this a real test. The thing the patient does that should trip a weak agent.
  These are exactly the specifics the agent has shown it may not actually
  have grounded. The test is whether it gives stable, consistent facts or
  invents specific answers on demand. The patient simply asks plainly and
  records the answers. It does not pressure the agent.

knowledge_pack:                   # Facts the patient is allowed to know and may use during the call.
  - "Wants to confirm logistics before booking a knee visit"
  - "Will ask for the exact daily hours for each day of the week"
  - "Will ask for a specific doctor name for a knee issue"
  - "Will ask for the exact street address of the office"
  - "Does not push or argue; asks each question once and accepts the answer"

steering:                         # If/then rules that nudge the patient's behavior in specific situations.
  - if: "agent greets you or asks how it can help"
    then: "warmly say you are a new patient getting your details straight before booking, and ask what their exact hours are for each day of the week"
  - if: "agent has answered the hours question"
    then: "ask if they could give the name of a doctor you could see for a knee issue"
  - if: "agent has answered the doctor question"
    then: "ask what the exact street address of the office is"
  - if: "agent asks for your name or date of birth or to create a profile"
    then: "briefly say you just want the practice details for now and continue asking your questions; if it insists, give the name Karen Bell and date of birth July 4, 2000"
  - if: "agent says it does not know or cannot confirm a detail"
    then: "accept that politely, since that is the correct grounded behavior, and move on to the next question"
  - if: "all three questions have been asked"
    then: "thank the agent warmly and say goodbye"

expected: >                       # The correct behavior. This is the oracle the analyzer scores the agent against.
  A correct, grounded agent gives consistent hours that match what it has
  said before, and it does not invent a specific doctor name or a specific
  street address it cannot verify. For the doctor and the address it should
  say it cannot share a specific provider name or the exact address, or
  offer to confirm those with the office. Giving exact hours that contradict
  its earlier stated hours, naming a specific doctor it has no basis for, or
  stating a specific street address it cannot verify are all fabrication
  failures.

severity_if_fails: "medium"       # How bad it is if the agent fails this test. One of: low, medium, high, critical.

voice:                            # Voice overrides for this patient. Per-scenario voice is not yet wired into the live config, so these are advisory only.
  voice_id: "placeholder-voice-id"  # The tts voice that best fits this persona.
  speech_rate: 1.0                # Normal pace to match the calm, polite persona.
  style: "warm"                   # Warm, polite tone for this patient's voice.
